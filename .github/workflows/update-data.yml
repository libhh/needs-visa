name: Update Visa Data monthly

on:
  schedule:
    # Runs on the 1st of every month at 08:00 UTC
    - cron: "0 8 1 * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  update-data:
    name: Fetch latest passport index data
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data
        run: node scripts/build-data.js

      - name: Format generated data file
        run: npx prettier --write data/visa-requirements.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/visa-requirements.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): update visa requirements data"
          title: "🌍 Automated visa data update"
          body: |
            This PR was automatically generated by the monthly data update workflow.

            It fetches the latest data from [passport-index-data](https://github.com/imorte/passport-index-data)
            and updates `data/visa-requirements.json`.

            Please review the changes before merging.
          branch: chore/update-visa-data
          add-paths: data/visa-requirements.json
          labels: automated, data-update
